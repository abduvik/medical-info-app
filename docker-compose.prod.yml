# Production stack. Extends the dev compose file (which only defines the
# "db" service) and adds the backend (built + run under PM2) and the
# frontend (static Next.js export served by its own nginx container).
#
# Usage:
#   cp .env.example .env
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env up --build -d
services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Overrides the .env DATABASE_URL (which points at localhost for
      # host-based dev) so the containerized backend talks to the "db"
      # service by its Docker network hostname instead.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    ports:
      - "${BACKEND_PORT:-4000}:4000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_TRPC_URL: ${NEXT_PUBLIC_TRPC_URL}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
